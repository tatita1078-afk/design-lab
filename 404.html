<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>404 — LEDJ</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;background:#fff;overflow:hidden;}

  .stage{
    width:100vw;height:100vh;
    position:relative;
    background:#fff;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    gap:32px;
  }

  /* grain canvas */
  #grain{position:absolute;inset:0;pointer-events:none;z-index:0;}

  /* цветные пятна */
  .glow{position:absolute;border-radius:50%;filter:blur(200px);pointer-events:none;z-index:0;}
  .glow-violet{width:600px;height:600px;background:rgba(91,33,255,.08);top:-100px;right:100px;}
  .glow-red{width:400px;height:400px;background:rgba(255,47,34,.06);bottom:-60px;left:200px;}

  /* 404 */
  .glitch-wrap{position:relative;z-index:2;text-align:center;}
  .num-404{
    font-family:'Unbounded',sans-serif;
    font-weight:900;
    font-size:clamp(160px, 22vw, 280px);
    line-height:1;
    color:var(--ink,#0E0E10);
    position:relative;
    display:inline-block;
    letter-spacing:-4px;
  }

  /* glitch слои */
  .num-404::before,
  .num-404::after{
    content:'404';
    position:absolute;
    inset:0;
    font-family:'Unbounded',sans-serif;
    font-weight:900;
    font-size:inherit;
    letter-spacing:-4px;
  }
  .num-404::before{
    color:#FF2F22;
    animation:glitchR 3.5s infinite steps(1);
    clip-path:inset(0 0 60% 0);
  }
  .num-404::after{
    color:#5B21FF;
    animation:glitchB 3.5s infinite steps(1);
    clip-path:inset(40% 0 0 0);
  }

  @keyframes glitchR{
    0%  {clip-path:inset(0 0 85% 0); transform:translate(0,0);}
    5%  {clip-path:inset(10% 0 60% 0);transform:translate(-8px, 2px);}
    10% {clip-path:inset(40% 0 30% 0);transform:translate(6px,-3px);}
    15% {clip-path:inset(70% 0 10% 0);transform:translate(-4px, 4px);}
    20% {clip-path:inset(0 0 85% 0); transform:translate(0,0);}
    55% {clip-path:inset(0 0 85% 0); transform:translate(0,0);}
    58% {clip-path:inset(20% 0 50% 0);transform:translate(10px,-2px);}
    61% {clip-path:inset(60% 0 5% 0); transform:translate(-6px, 3px);}
    64% {clip-path:inset(0 0 85% 0); transform:translate(0,0);}
    100%{clip-path:inset(0 0 85% 0); transform:translate(0,0);}
  }

  @keyframes glitchB{
    0%  {clip-path:inset(80% 0 0 0); transform:translate(0,0);}
    5%  {clip-path:inset(60% 0 0 0); transform:translate(8px,-2px);}
    10% {clip-path:inset(30% 0 0 0); transform:translate(-5px, 3px);}
    15% {clip-path:inset(80% 0 0 0); transform:translate(0,0);}
    55% {clip-path:inset(80% 0 0 0); transform:translate(0,0);}
    58% {clip-path:inset(50% 0 0 0); transform:translate(-9px, 2px);}
    61% {clip-path:inset(70% 0 0 0); transform:translate(5px,-3px);}
    64% {clip-path:inset(80% 0 0 0); transform:translate(0,0);}
    100%{clip-path:inset(80% 0 0 0); transform:translate(0,0);}
  }

  /* текст под цифрами */
  .msg{
    position:relative;z-index:2;
    text-align:center;
  }
  .msg h2{
    font-family:'Unbounded',sans-serif;
    font-weight:600;font-size:clamp(16px,2vw,22px);
    color:#0E0E10;margin-bottom:12px;
  }
  .msg p{
    font-family:'Inter',sans-serif;
    font-size:15px;color:#8C8A87;
    line-height:1.6;max-width:460px;margin:0 auto 28px;
  }
  .btn-back{
    display:inline-flex;align-items:center;gap:8px;
    background:#FF2F22;color:#fff;
    font-family:'Inter';font-weight:700;font-size:14px;
    padding:14px 26px;border-radius:100px;
    text-decoration:none;
    position:relative;isolation:isolate;
  }
  .btn-back::after{
    --s0:inset(50% 50% 50% 50%);
    --s1:inset(80% -6px 0 0);--s2:inset(50% -6px 30% 0);
    --s3:inset(10% -6px 85% 0);--s4:inset(40% -6px 43% 0);
    --s5:inset(80% -6px 5% 0);
    content:"ВЕРНУТЬСЯ НА ГЛАВНУЮ";
    display:flex;align-items:center;justify-content:center;
    position:absolute;inset:0;border-radius:100px;
    background:linear-gradient(45deg,transparent 3%,#00e6f6 3%,#00e6f6 5%,#ff013c 5%);
    clip-path:var(--s0);pointer-events:none;
  }
  .btn-back:hover::after{animation:1s glitchBtn steps(2,end);}
  @keyframes glitchBtn{
    0%  {clip-path:var(--s1);transform:translate(-20px,-10px);}
    10% {clip-path:var(--s3);transform:translate(10px,10px);}
    20% {clip-path:var(--s1);transform:translate(-10px,10px);}
    30% {clip-path:var(--s3);transform:translate(0,5px);}
    40% {clip-path:var(--s2);transform:translate(-5px,0);}
    50% {clip-path:var(--s3);transform:translate(5px,0);}
    60% {clip-path:var(--s4);transform:translate(5px,10px);}
    70% {clip-path:var(--s2);transform:translate(-10px,10px);}
    80% {clip-path:var(--s5);transform:translate(20px,-10px);}
    90% {clip-path:var(--s1);transform:translate(-10px,0);}
    100%{clip-path:var(--s1);transform:translate(0);}
  }
</style>
</head>
<body>

<div class="stage">
  <canvas id="grain"></canvas>
  <div class="glow glow-violet"></div>
  <div class="glow glow-red"></div>

  <div class="glitch-wrap">
    <span class="num-404">404</span>
  </div>

  <div class="msg">
    <h2>Страница запущена,<br>но до аудитории не дошла</h2>
    <p>Именно так выглядит реклама без стратегии.<br>С LEDJ такого не бывает.</p>
    <a class="btn-back" href="/">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M5 19 19 5M9 5h10v10"/></svg>
      ВЕРНУТЬСЯ НА ГЛАВНУЮ
    </a>
  </div>
</div>

<script>
  // Grain
  const canvas = document.getElementById('grain');
  const W = canvas.width  = window.innerWidth;
  const H = canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const OPACITY = 0.09;
  const FPS = 10;
  let last = 0;

  function drawGrain(){
    const img = ctx.createImageData(W, H);
    const d = img.data;
    for(let i = 0; i < d.length; i += 4){
      const v = Math.random() * 255 | 0;
      d[i]=v; d[i+1]=v; d[i+2]=v;
      d[i+3] = OPACITY * 255 | 0;
    }
    ctx.putImageData(img, 0, 0);
  }

  function loop(ts){
    if(ts - last > 1000 / FPS){ drawGrain(); last = ts; }
    requestAnimationFrame(loop);
  }
  drawGrain();
  requestAnimationFrame(loop);
</script>

</body>
</html>
