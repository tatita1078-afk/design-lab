<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>404 — LEDJ</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;background:#fff;overflow:hidden;}

  .stage{
    width:100vw;height:100vh;
    position:relative;background:#fff;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:32px;
  }

  #grain{position:absolute;inset:0;pointer-events:none;z-index:0;}

  .glow{position:absolute;border-radius:50%;filter:blur(200px);pointer-events:none;z-index:0;}
  .glow-violet{width:600px;height:600px;background:rgba(91,33,255,.08);top:-100px;right:100px;}
  .glow-red{width:400px;height:400px;background:rgba(255,47,34,.06);bottom:-60px;left:200px;}

  /* ===== 404 GLITCH — по принципу кнопки ===== */
  .glitch-wrap{position:relative;z-index:2;text-align:center;}

  .num-404,
  .num-404::before,
  .num-404::after {
    font-family:'Unbounded',sans-serif;
    font-weight:900;
    font-size:clamp(160px, 22vw, 280px);
    line-height:1;
    letter-spacing:-4px;
    display:inline-block;
  }

  .num-404 {
    color:#0E0E10;
    position:relative;
    isolation:isolate;
  }

  .num-404::before,
  .num-404::after {
    content:'404';
    position:absolute;
    top:0;left:0;right:0;bottom:0;
  }

  /* Красный слой */
  .num-404::before {
    --slice-0: inset(50% 50% 50% 50%);
    --slice-1: inset(5% -6px 85% 0);
    --slice-2: inset(15% -6px 60% 0);
    --slice-3: inset(40% -6px 40% 0);
    --slice-4: inset(65% -6px 15% 0);
    --slice-5: inset(80% -6px 5% 0);
    background: linear-gradient(45deg, transparent 3%, #00e6f6 3%, #00e6f6 5%, #ff013c 5%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    clip-path: var(--slice-0);
    animation: glitch404-r 4s infinite;
    animation-timing-function: steps(2, end);
  }

  /* Фиолетовый слой */
  .num-404::after {
    --slice-0: inset(50% 50% 50% 50%);
    --slice-1: inset(80% -6px 0 0);
    --slice-2: inset(50% -6px 30% 0);
    --slice-3: inset(10% -6px 85% 0);
    --slice-4: inset(40% -6px 43% 0);
    --slice-5: inset(80% -6px 5% 0);
    background: linear-gradient(45deg, #5B21FF 0%, transparent 40%, #FF2F22 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    clip-path: var(--slice-0);
    animation: glitch404-b 4s infinite;
    animation-timing-function: steps(2, end);
    animation-delay: .15s;
  }

  @keyframes glitch404-r {
    0%   { clip-path: var(--slice-0); transform: translate(0,0); }
    /* вспышка 1 */
    8%   { clip-path: var(--slice-1); transform: translate(-18px, -8px); }
    10%  { clip-path: var(--slice-3); transform: translate(12px, 6px); }
    12%  { clip-path: var(--slice-2); transform: translate(-8px, 10px); }
    14%  { clip-path: var(--slice-4); transform: translate(6px, -4px); }
    16%  { clip-path: var(--slice-0); transform: translate(0,0); }
    /* пауза */
    55%  { clip-path: var(--slice-0); transform: translate(0,0); }
    /* вспышка 2 */
    57%  { clip-path: var(--slice-3); transform: translate(14px, -6px); }
    59%  { clip-path: var(--slice-1); transform: translate(-10px, 8px); }
    61%  { clip-path: var(--slice-5); transform: translate(8px, -2px); }
    63%  { clip-path: var(--slice-0); transform: translate(0,0); }
    100% { clip-path: var(--slice-0); transform: translate(0,0); }
  }

  @keyframes glitch404-b {
    0%   { clip-path: var(--slice-0); transform: translate(0,0); }
    /* вспышка 1 — чуть сдвинута по времени */
    8%   { clip-path: var(--slice-2); transform: translate(16px, 6px); }
    10%  { clip-path: var(--slice-4); transform: translate(-10px, -8px); }
    12%  { clip-path: var(--slice-1); transform: translate(6px, 12px); }
    14%  { clip-path: var(--slice-3); transform: translate(-4px, -6px); }
    16%  { clip-path: var(--slice-0); transform: translate(0,0); }
    55%  { clip-path: var(--slice-0); transform: translate(0,0); }
    /* вспышка 2 */
    57%  { clip-path: var(--slice-4); transform: translate(-12px, 8px); }
    59%  { clip-path: var(--slice-2); transform: translate(10px, -6px); }
    61%  { clip-path: var(--slice-1); transform: translate(-6px, 4px); }
    63%  { clip-path: var(--slice-0); transform: translate(0,0); }
    100% { clip-path: var(--slice-0); transform: translate(0,0); }
  }

  /* ===== ТЕКСТ ===== */
  .msg{position:relative;z-index:2;text-align:center;}
  .msg h2{
    font-family:'Unbounded',sans-serif;font-weight:600;
    font-size:clamp(16px,2vw,22px);color:#0E0E10;margin-bottom:12px;
  }
  .msg p{
    font-family:'Inter',sans-serif;font-size:15px;color:#8C8A87;
    line-height:1.6;max-width:460px;margin:0 auto 28px;
  }

  /* ===== КНОПКА — тот же glitch ===== */
  .btn-back,
  .btn-back::after {
    padding:14px 26px;
    font-size:14px;
    font-family:'Inter';
    font-weight:700;
    background:#FF2F22;
    border:0;color:#fff;
    border-radius:100px;
  }
  .btn-back {
    display:inline-flex;align-items:center;gap:8px;
    position:relative;isolation:isolate;
    text-decoration:none;cursor:pointer;
  }
  .btn-back::after {
    --slice-0: inset(50% 50% 50% 50%);
    --slice-1: inset(80% -6px 0 0);
    --slice-2: inset(50% -6px 30% 0);
    --slice-3: inset(10% -6px 85% 0);
    --slice-4: inset(40% -6px 43% 0);
    --slice-5: inset(80% -6px 5% 0);
    content:"ВЕРНУТЬСЯ НА ГЛАВНУЮ";
    display:flex;align-items:center;justify-content:center;
    position:absolute;inset:0;border-radius:100px;
    background:linear-gradient(45deg,transparent 3%,#00e6f6 3%,#00e6f6 5%,#ff013c 5%);
    clip-path:var(--slice-0);pointer-events:none;
  }
  .btn-back:hover::after{
    animation:1s glitchBtn steps(2,end);
  }
  @keyframes glitchBtn{
    0%  {clip-path:var(--slice-1);transform:translate(-20px,-10px);}
    10% {clip-path:var(--slice-3);transform:translate(10px,10px);}
    20% {clip-path:var(--slice-1);transform:translate(-10px,10px);}
    30% {clip-path:var(--slice-3);transform:translate(0,5px);}
    40% {clip-path:var(--slice-2);transform:translate(-5px,0);}
    50% {clip-path:var(--slice-3);transform:translate(5px,0);}
    60% {clip-path:var(--slice-4);transform:translate(5px,10px);}
    70% {clip-path:var(--slice-2);transform:translate(-10px,10px);}
    80% {clip-path:var(--slice-5);transform:translate(20px,-10px);}
    90% {clip-path:var(--slice-1);transform:translate(-10px,0);}
    100%{clip-path:var(--slice-1);transform:translate(0);}
  }
</style>
</head>
<body>

<div class="stage">
  <canvas id="grain"></canvas>
  <div class="glow glow-violet"></div>
  <div class="glow glow-red"></div>

  <div class="glitch-wrap">
    <span class="num-404">404</span>
  </div>

  <div class="msg">
    <h2>Страница запущена,<br>но до аудитории не дошла</h2>
    <p>Именно так выглядит реклама без стратегии.<br>С LEDJ такого не бывает.</p>
    <a class="btn-back" href="/">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M5 19 19 5M9 5h10v10"/></svg>
      ВЕРНУТЬСЯ НА ГЛАВНУЮ
    </a>
  </div>
</div>

<script>
  const canvas = document.getElementById('grain');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const OPACITY = 0.09;
  const FPS = 10;
  let last = 0;

  function drawGrain(){
    const img = ctx.createImageData(canvas.width, canvas.height);
    const d = img.data;
    for(let i = 0; i < d.length; i += 4){
      const v = Math.random() * 255 | 0;
      d[i]=v; d[i+1]=v; d[i+2]=v;
      d[i+3] = OPACITY * 255 | 0;
    }
    ctx.putImageData(img, 0, 0);
  }

  function loop(ts){
    if(ts - last > 1000/FPS){ drawGrain(); last = ts; }
    requestAnimationFrame(loop);
  }
  drawGrain();
  requestAnimationFrame(loop);
</script>
</body>
</html>
